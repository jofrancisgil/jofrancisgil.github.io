<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Màquina de Funcions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Animació per l'engranatge */
        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin-slow {
            animation: spin-slow 4s linear infinite;
        }
        
        /* Amagar les fletxes de l'input number */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800 min-h-screen flex flex-col items-center py-8 px-4">

    <!-- Contenidor Principal -->
    <div class="w-full max-w-4xl relative">
        
        <!-- Botó Tornar a la pàgina anterior -->
        <button onclick="window.history.back()" class="flex items-center gap-2 text-slate-500 hover:text-indigo-600 font-medium mb-6 transition-colors group">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="group-hover:-translate-x-1 transition-transform"><path d="m15 18-6-6 6-6"/></svg>
            Tornar a la pàgina anterior
        </button>

        <!-- Capçalera -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 mb-8 flex justify-between items-center w-full max-w-3xl mx-auto">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-500 p-2 rounded-lg text-white">
                    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="animate-spin-slow"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
                </div>
                <h1 class="text-xl md:text-2xl font-bold text-slate-800">Màquina de Funcions</h1>
            </div>
            <div class="flex items-center gap-2 bg-amber-100 text-amber-600 px-4 py-2 rounded-full font-bold">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-amber-500"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                <span>Punts: <span id="score-display">0</span></span>
            </div>
        </div>

        <!-- Controls: Mode i Operació -->
        <div class="flex flex-col gap-3 mb-12 w-full max-w-md mx-auto">
            <!-- Selectors de Mode -->
            <div class="flex gap-2 bg-slate-200 p-1.5 rounded-xl w-full">
                <button onclick="setMode('findOutput')" id="btn-mode-findOutput" class="flex-1 py-2 px-4 rounded-lg font-medium text-sm transition-all bg-white shadow-sm text-indigo-600">Troba la Sortida</button>
                <button onclick="setMode('findInput')" id="btn-mode-findInput" class="flex-1 py-2 px-4 rounded-lg font-medium text-sm transition-all text-slate-600 hover:bg-slate-300">Troba l'Entrada</button>
                <button onclick="setMode('findRule')" id="btn-mode-findRule" class="flex-1 py-2 px-4 rounded-lg font-medium text-sm transition-all text-slate-600 hover:bg-slate-300">Troba la Regla</button>
            </div>

            <!-- Selectors d'Operació -->
            <div id="op-selector-container" class="flex gap-2 bg-slate-200 p-1.5 rounded-xl w-full items-center">
                <span class="text-xs font-bold text-slate-500 uppercase px-2 hidden sm:block">Operació:</span>
                <button onclick="setOp('all')" id="btn-op-all" class="flex-1 py-1.5 px-2 rounded-lg font-bold text-sm transition-all bg-white shadow-sm text-indigo-600">Totes</button>
                <button onclick="setOp('+')" id="btn-op-add" class="flex-1 py-1.5 px-2 rounded-lg font-bold text-sm transition-all text-slate-600 hover:bg-slate-300">+</button>
                <button onclick="setOp('-')" id="btn-op-sub" class="flex-1 py-1.5 px-2 rounded-lg font-bold text-sm transition-all text-slate-600 hover:bg-slate-300">-</button>
                <button onclick="setOp('×')" id="btn-op-mul" class="flex-1 py-1.5 px-2 rounded-lg font-bold text-sm transition-all text-slate-600 hover:bg-slate-300">×</button>
                <button onclick="setOp('÷')" id="btn-op-div" class="flex-1 py-1.5 px-2 rounded-lg font-bold text-sm transition-all text-slate-600 hover:bg-slate-300">÷</button>
            </div>
        </div>

        <!-- La Màquina -->
        <div class="relative flex items-center justify-center w-full max-w-4xl gap-4 md:gap-8 flex-col md:flex-row mx-auto">
            
            <!-- ENTRADA -->
            <div class="flex flex-col items-center">
                <span class="text-slate-500 font-semibold mb-2 uppercase tracking-wide text-sm">Entrada</span>
                <div id="box-input" class="w-24 h-24 md:w-32 md:h-32 rounded-2xl border-4 flex items-center justify-center text-4xl font-bold shadow-inner bg-slate-100 border-slate-300">
                    <span id="val-input" class="text-slate-700"></span>
                </div>
            </div>

            <!-- FLETXA CONECTORA -->
            <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-slate-300 hidden md:block"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
            <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-slate-300 block md:hidden rotate-90 my-2"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>

            <!-- MÀQUINA CENTRAL (REGLA) -->
            <div class="relative z-10 flex flex-col items-center group">
                <div class="absolute -top-12 opacity-0 group-hover:opacity-100 transition-opacity bg-slate-800 text-white text-xs px-3 py-1 rounded-full pointer-events-none">
                    La Regla
                </div>
                <div class="w-40 h-40 md:w-56 md:h-56 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-[2rem] shadow-[0_20px_50px_rgba(79,_70,_229,_0.3)] border-8 border-indigo-400/30 flex items-center justify-center relative overflow-hidden">
                    <div class="absolute top-4 left-4 w-3 h-3 bg-white/40 rounded-full"></div>
                    <div class="absolute top-4 right-4 w-3 h-3 bg-white/40 rounded-full"></div>
                    
                    <div id="box-rule" class="w-[80%] h-[60%] bg-white/10 backdrop-blur-sm rounded-xl border border-white/20 flex items-center justify-center text-5xl font-extrabold text-white">
                        <span id="val-rule" class="drop-shadow-md"></span>
                    </div>
                </div>
            </div>

            <!-- FLETXA CONECTORA -->
            <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-slate-300 hidden md:block"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
            <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-slate-300 block md:hidden rotate-90 my-2"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>

            <!-- SORTIDA -->
            <div class="flex flex-col items-center">
                <span class="text-slate-500 font-semibold mb-2 uppercase tracking-wide text-sm">Sortida</span>
                <div id="box-output" class="w-24 h-24 md:w-32 md:h-32 rounded-2xl border-4 flex items-center justify-center text-4xl font-bold shadow-inner bg-slate-100 border-slate-300">
                    <span id="val-output" class="text-slate-700"></span>
                </div>
            </div>
        </div>

        <!-- ZONA DE RESPOSTA -->
        <div class="mt-16 w-full max-w-md bg-white rounded-2xl shadow-lg border border-slate-100 p-8 flex flex-col items-center mx-auto">
            
            <h3 id="prompt-text" class="text-lg font-semibold text-slate-700 mb-6 text-center"></h3>

            <!-- Input per Número (Sortida i Entrada) -->
            <input 
                type="number" 
                id="answer-input" 
                placeholder="Escriu el número" 
                oninput="handleInput()"
                onkeydown="handleKeyPress(event)"
                class="w-full text-center text-2xl py-3 px-4 rounded-xl border-2 border-slate-200 focus:border-indigo-500 focus:ring-4 focus:ring-indigo-100 outline-none transition-all hidden"
            >

            <!-- Input per Regla (Operació) -->
            <select 
                id="answer-select" 
                onchange="handleInput()"
                class="w-full text-center text-2xl py-3 px-4 rounded-xl border-2 border-slate-200 focus:border-indigo-500 bg-white outline-none font-bold text-slate-700 cursor-pointer hidden"
            >
                <option value="" disabled selected>Tria l'operació...</option>
                <option value="+">+</option>
                <option value="-">-</option>
                <option value="×">×</option>
                <option value="÷">÷</option>
            </select>

            <!-- Feedback -->
            <div id="feedback-container" class="mt-6 p-4 rounded-xl w-full flex items-center justify-center gap-2 font-bold hidden">
                <svg id="icon-correct" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="hidden"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/></svg>
                <svg id="icon-incorrect" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="hidden"><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></svg>
                <span id="feedback-text"></span>
            </div>

            <!-- Botó d'Acció -->
            <div class="mt-8 w-full">
                <button 
                    id="action-btn" 
                    onclick="handleActionClick()"
                    disabled
                    class="w-full bg-slate-300 text-slate-500 cursor-not-allowed font-bold py-4 rounded-xl shadow-md transition-all active:scale-[0.98] flex items-center justify-center gap-2"
                >
                    <svg id="icon-refresh" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="hidden"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                    <span id="action-btn-text">Comprova la resposta</span>
                </button>
            </div>
        </div>

    </div>

    <!-- Script de Lògica -->
    <script>
        // Estats
        let mode = 'findOutput';
        let selectedOp = 'all';
        let problem = null;
        let userAnswer = '';
        let userRuleOp = '';
        let feedback = null;
        let score = 0;

        // Diccionari d'operacions per als IDs
        const opIdMap = { 'all': 'all', '+': 'add', '-': 'sub', '×': 'mul', '÷': 'div' };

        // Generar un nou problema
        function generateProblem() {
            const ops = ['+', '-', '×', '÷'];
            const op = (mode !== 'findRule' && selectedOp !== 'all') 
                ? selectedOp 
                : ops[Math.floor(Math.random() * ops.length)];
            
            let input, val, output;

            if (op === '+') {
                input = Math.floor(Math.random() * 20) + 1;
                val = Math.floor(Math.random() * 15) + 1;
                output = input + val;
            } else if (op === '-') {
                val = Math.floor(Math.random() * 15) + 1;
                output = Math.floor(Math.random() * 15) + 1;
                input = output + val;
            } else if (op === '×') {
                input = Math.floor(Math.random() * 10) + 1;
                val = Math.floor(Math.random() * 10) + 1;
                output = input * val;
            } else if (op === '÷') {
                val = Math.floor(Math.random() * 9) + 2; 
                output = Math.floor(Math.random() * 10) + 1;
                input = output * val;
            }

            problem = { in: input, op, val, out: output };
            userAnswer = '';
            userRuleOp = '';
            feedback = null;
            
            document.getElementById('answer-input').value = '';
            document.getElementById('answer-select').value = '';
            
            render();
            
            if(mode !== 'findRule') {
                document.getElementById('answer-input').focus();
            }
        }

        // Comprovar resposta
        function checkAnswer() {
            let isCorrect = false;

            if (mode === 'findOutput') {
                isCorrect = parseInt(userAnswer) === problem.out;
            } else if (mode === 'findInput') {
                isCorrect = parseInt(userAnswer) === problem.in;
            } else if (mode === 'findRule') {
                isCorrect = userRuleOp === problem.op;
            }

            if (isCorrect) {
                feedback = 'correct';
                score++;
            } else {
                feedback = 'incorrect';
            }

            render();
        }

        // Gestors d'esdeveniments
        function setMode(newMode) {
            mode = newMode;
            generateProblem();
        }

        function setOp(newOp) {
            selectedOp = newOp;
            generateProblem();
        }

        function handleInput() {
            if (mode === 'findRule') {
                userRuleOp = document.getElementById('answer-select').value;
            } else {
                userAnswer = document.getElementById('answer-input').value;
            }
            renderActionButton();
        }

        function handleActionClick() {
            if (feedback === 'correct') {
                generateProblem();
            } else {
                checkAnswer();
            }
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') {
                if (feedback !== 'correct') {
                    // Només comprovar si el botó està actiu
                    const actionBtn = document.getElementById('action-btn');
                    if(!actionBtn.disabled) checkAnswer();
                } else {
                    generateProblem();
                }
            }
        }

        // Actualització parcial del botó (per rendiment quan s'escriu)
        function renderActionButton() {
            const actionBtn = document.getElementById('action-btn');
            if (feedback === 'correct') return; // Si està correcte, el botó ja és "Nova Màquina"

            const hasValue = (mode === 'findRule') ? !!userRuleOp : !!userAnswer;
            
            if (hasValue) {
                actionBtn.disabled = false;
                actionBtn.className = "w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl shadow-md transition-all active:scale-[0.98] flex items-center justify-center gap-2";
            } else {
                actionBtn.disabled = true;
                actionBtn.className = "w-full bg-slate-300 text-slate-500 cursor-not-allowed font-bold py-4 rounded-xl shadow-md transition-all flex items-center justify-center gap-2";
            }
        }

        // Funció principal per renderitzar la UI
        function render() {
            if (!problem) return;

            // Score
            document.getElementById('score-display').innerText = score;

            // Selectors de Mode
            ['findOutput', 'findInput', 'findRule'].forEach(m => {
                const btn = document.getElementById(`btn-mode-${m}`);
                if (m === mode) {
                    btn.className = "flex-1 py-2 px-4 rounded-lg font-medium text-sm transition-all bg-white shadow-sm text-indigo-600";
                } else {
                    btn.className = "flex-1 py-2 px-4 rounded-lg font-medium text-sm transition-all text-slate-600 hover:bg-slate-300";
                }
            });

            // Selectors d'Operació
            const opContainer = document.getElementById('op-selector-container');
            if (mode === 'findRule') {
                opContainer.style.display = 'none';
            } else {
                opContainer.style.display = 'flex';
                ['all', '+', '-', '×', '÷'].forEach(op => {
                    const btn = document.getElementById(`btn-op-${opIdMap[op]}`);
                    if (op === selectedOp) {
                        btn.className = "flex-1 py-1.5 px-2 rounded-lg font-bold text-sm transition-all bg-white shadow-sm text-indigo-600";
                    } else {
                        btn.className = "flex-1 py-1.5 px-2 rounded-lg font-bold text-sm transition-all text-slate-600 hover:bg-slate-300";
                    }
                });
            }

            // Màquina: Entrada
            const valInput = document.getElementById('val-input');
            const boxInput = document.getElementById('box-input');
            if (mode === 'findInput') {
                valInput.innerHTML = '<span class="text-indigo-400">?</span>';
                boxInput.className = "w-24 h-24 md:w-32 md:h-32 rounded-2xl border-4 flex items-center justify-center text-4xl font-bold shadow-inner bg-white border-indigo-400 border-dashed";
            } else {
                valInput.innerHTML = `<span class="text-slate-700">${problem.in}</span>`;
                boxInput.className = "w-24 h-24 md:w-32 md:h-32 rounded-2xl border-4 flex items-center justify-center text-4xl font-bold shadow-inner bg-slate-100 border-slate-300";
            }

            // Màquina: Regla
            const valRule = document.getElementById('val-rule');
            const boxRule = document.getElementById('box-rule');
            if (mode === 'findRule') {
                valRule.innerHTML = `<span class="drop-shadow-md text-white">? ${problem.val}</span>`;
                boxRule.className = "w-[80%] h-[60%] backdrop-blur-sm rounded-xl border flex items-center justify-center text-5xl font-extrabold text-white border-dashed border-white/50 bg-white/5";
            } else {
                valRule.innerHTML = `<span class="drop-shadow-md text-white">${problem.op} ${problem.val}</span>`;
                boxRule.className = "w-[80%] h-[60%] backdrop-blur-sm rounded-xl border flex items-center justify-center text-5xl font-extrabold text-white bg-white/10 border-white/20";
            }

            // Màquina: Sortida
            const valOutput = document.getElementById('val-output');
            const boxOutput = document.getElementById('box-output');
            if (mode === 'findOutput') {
                valOutput.innerHTML = '<span class="text-indigo-400">?</span>';
                boxOutput.className = "w-24 h-24 md:w-32 md:h-32 rounded-2xl border-4 flex items-center justify-center text-4xl font-bold shadow-inner bg-white border-indigo-400 border-dashed";
            } else {
                valOutput.innerHTML = `<span class="text-slate-700">${problem.out}</span>`;
                boxOutput.className = "w-24 h-24 md:w-32 md:h-32 rounded-2xl border-4 flex items-center justify-center text-4xl font-bold shadow-inner bg-slate-100 border-slate-300";
            }

            // Prompts
            const promptText = document.getElementById('prompt-text');
            if (mode === 'findOutput') promptText.innerText = "Quina és la sortida de la màquina?";
            else if (mode === 'findInput') promptText.innerText = "Quin número ha entrat a la màquina?";
            else promptText.innerText = "Quina operació fa aquesta màquina?";

            // Inputs d'usuari (text o select)
            const inputNum = document.getElementById('answer-input');
            const inputSel = document.getElementById('answer-select');
            if (mode === 'findRule') {
                inputNum.classList.add('hidden');
                inputSel.classList.remove('hidden');
                inputSel.disabled = (feedback === 'correct');
            } else {
                inputSel.classList.add('hidden');
                inputNum.classList.remove('hidden');
                inputNum.disabled = (feedback === 'correct');
            }

            // Feedback i Botó principal
            const fContainer = document.getElementById('feedback-container');
            const iCorrect = document.getElementById('icon-correct');
            const iIncorrect = document.getElementById('icon-incorrect');
            const fText = document.getElementById('feedback-text');
            const actionBtn = document.getElementById('action-btn');
            const aText = document.getElementById('action-btn-text');
            const iRefresh = document.getElementById('icon-refresh');

            if (feedback) {
                fContainer.classList.remove('hidden');
                if (feedback === 'correct') {
                    fContainer.className = "mt-6 p-4 rounded-xl w-full flex items-center justify-center gap-2 font-bold bg-emerald-100 text-emerald-700";
                    iCorrect.classList.remove('hidden');
                    iIncorrect.classList.add('hidden');
                    fText.innerText = "Molt bé! Lògica perfecta.";

                    // Configurar botó a "Nova Màquina"
                    actionBtn.disabled = false;
                    actionBtn.className = "w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-4 rounded-xl shadow-md transition-all active:scale-[0.98] flex items-center justify-center gap-2";
                    aText.innerText = "Nova Màquina";
                    iRefresh.classList.remove('hidden');
                } else {
                    fContainer.className = "mt-6 p-4 rounded-xl w-full flex items-center justify-center gap-2 font-bold bg-rose-100 text-rose-700";
                    iCorrect.classList.add('hidden');
                    iIncorrect.classList.remove('hidden');
                    fText.innerText = "Uix! Repassa-ho i torna a provar.";
                    
                    // Configurar botó per re-comprovar
                    aText.innerText = "Comprova la resposta";
                    iRefresh.classList.add('hidden');
                    renderActionButton(); // Ajusta l'estat activat/desactivat
                }
            } else {
                fContainer.classList.add('hidden');
                aText.innerText = "Comprova la resposta";
                iRefresh.classList.add('hidden');
                renderActionButton();
            }
        }

        // Inicialitzar el primer cop
        generateProblem();
    </script>
</body>
</html>
