<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Ruleta de la Sort</title>
    <style>
        :root {
            --primary: #4a90e2;
            --secondary: #f5a623;
            --background: #f0f4f8;
            --text: #333;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: var(--primary);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: center;
            max-width: 1000px;
            width: 100%;
        }

        .controls {
            flex: 1;
            min-width: 300px;
            background: var(--white);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .wheel-container {
            flex: 1;
            min-width: 300px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        textarea {
            width: 100%;
            height: 150px;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            resize: vertical;
            margin-bottom: 15px;
            box-sizing: border-box;
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
            width: 100%;
            margin-bottom: 10px;
            font-weight: bold;
        }

        button:hover {
            background-color: #357abd;
        }

        button:active {
            transform: scale(0.98);
        }

        button.spin-btn {
            background-color: var(--secondary);
            font-size: 18px;
            padding: 15px;
        }

        button.spin-btn:hover {
            background-color: #d48e15;
        }

        button.spin-btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        canvas {
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
            max-width: 100%;
            height: auto;
        }

        .pointer {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid #e74c3c;
            z-index: 10;
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.3));
        }

        .result {
            margin-top: 20px;
            font-size: 24px;
            font-weight: bold;
            color: var(--primary);
            text-align: center;
            min-height: 40px;
            animation: popIn 0.5s ease-out;
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            80% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }

        .settings {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        label {
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
        }

        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background-color: #f00;
            animation: fall linear forwards;
            z-index: 100;
        }

        @keyframes fall {
            to { transform: translateY(100vh) rotate(720deg); }
        }
    </style>
</head>
<body>

    <h1>🎡 La Ruleta de la Sort</h1>

    <div class="container">
        <div class="controls">
            <label for="namesInput"><strong>Llista de participants (un per línia):</strong></label>
            <textarea id="namesInput" placeholder="Escriu els noms aquí...&#10;Anna&#10;Marc&#10;Laia&#10;Pau"></textarea>
            
            <button onclick="updateWheel()">Actualitzar Ruleta</button>
            <button class="spin-btn" id="spinBtn" onclick="spin()">GIRAR! 🚀</button>
            
            <div class="settings">
                <label>
                    <input type="checkbox" id="removeWinner" checked>
                    Eliminar guanyador després de girar
                </label>
            </div>
            <div class="settings">
                <label>
                    <input type="checkbox" id="soundEnabled" checked>
                    Activar so (simulat visualment)
                </label>
            </div>
        </div>

        <div class="wheel-container">
            <div class="pointer"></div>
            <canvas id="wheelCanvas" width="500" height="500"></canvas>
            <div id="result" class="result"></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const namesInput = document.getElementById('namesInput');
        const spinBtn = document.getElementById('spinBtn');
        const resultDiv = document.getElementById('result');
        const removeWinnerCheckbox = document.getElementById('removeWinner');

        let names = [];
        let colors = [];
        let startAngle = 0;
        let arc = 0;
        let spinTimeout = null;
        let spinArcStart = 10;
        let spinTime = 0;
        let spinTimeTotal = 0;
        let isSpinning = false;

        // Colors vibrants per als segments
        const palette = [
            '#FF6B6B', '#4ECDC4', '#45B7D1', '#FFA07A', 
            '#98D8C8', '#F7DC6F', '#BB8FCE', '#F1948A', 
            '#82E0AA', '#85C1E9'
        ];

        function init() {
            // Carregar noms guardats o usar predeterminats
            const savedNames = localStorage.getItem('ruletaNoms');
            if (savedNames) {
                namesInput.value = savedNames;
            } else {
                namesInput.value = "Anna\nMarc\nLaia\nPau\nSofia\nPol";
            }
            updateWheel();
        }

        function updateWheel() {
            if (isSpinning) return;
            
            const text = namesInput.value.trim();
            names = text.split('\n').filter(n => n.trim() !== '');
            
            if (names.length === 0) {
                names = ['Afegeix', 'noms', 'per', 'començar'];
                colors = ['#ccc', '#ccc', '#ccc', '#ccc'];
            } else {
                colors = names.map((_, i) => palette[i % palette.length]);
                // Guardar al navegador
                localStorage.setItem('ruletaNoms', namesInput.value);
            }

            arc = Math.PI * 2 / names.length;
            drawWheel();
            resultDiv.textContent = '';
        }

        function drawWheel() {
            if (names.length === 0) return;

            ctx.clearRect(0, 0, 500, 500);
            
            const outsideRadius = 240;
            const textRadius = 170;
            const insideRadius = 50;

            for (let i = 0; i < names.length; i++) {
                const angle = startAngle + i * arc;
                
                // Dibujar segmento
                ctx.fillStyle = colors[i];
                ctx.beginPath();
                ctx.arc(250, 250, outsideRadius, angle, angle + arc, false);
                ctx.arc(250, 250, insideRadius, angle + arc, angle, true);
                ctx.stroke();
                ctx.fill();

                // Dibujar texto
                ctx.save();
                ctx.shadowOffsetX = 1;
                ctx.shadowOffsetY = 1;
                ctx.shadowColor = "rgba(0,0,0,0.2)";
                ctx.fillStyle = "white";
                ctx.font = 'bold 18px Helvetica, Arial';
                
                // Posicionar texto
                ctx.translate(250 + Math.cos(angle + arc / 2) * textRadius, 
                              250 + Math.sin(angle + arc / 2) * textRadius);
                ctx.rotate(angle + arc / 2 + Math.PI / 2);
                
                const text = names[i];
                // Truncar texto si es muy largo
                const metrics = ctx.measureText(text);
                if (metrics.width > 140) {
                    ctx.font = 'bold 14px Helvetica, Arial';
                }
                
                ctx.fillText(text, -ctx.measureText(text).width / 2, 0);
                ctx.restore();
            }

            // Círculo central decorativo
            ctx.fillStyle = "#fff";
            ctx.beginPath();
            ctx.arc(250, 250, insideRadius - 5, 0, Math.PI * 2, true);
            ctx.fill();
            
            ctx.fillStyle = "#333";
            ctx.font = "bold 20px Arial";
            ctx.fillText("★", 242, 257);
        }

        function spin() {
            if (isSpinning || names.length < 2) {
                if(names.length < 2) alert("Necessites almenys 2 noms per girar!");
                return;
            }

            isSpinning = true;
            spinBtn.disabled = true;
            resultDiv.textContent = "Girant...";
            
            spinArcStart = Math.random() * 10 + 10;
            spinTime = 0;
            spinTimeTotal = Math.random() * 3000 + 4000;
            
            rotateWheel();
        }

        function rotateWheel() {
            spinTime += 30;
            if (spinTime >= spinTimeTotal) {
                stopRotateWheel();
                return;
            }
            
            // Efecto de desaceleración (easing out)
            const spinAngle = spinArcStart - easeOut(spinTime, 0, spinArcStart, spinTimeTotal);
            startAngle += (spinAngle * Math.PI / 180);
            drawWheel();
            spinTimeout = requestAnimationFrame(rotateWheel);
        }

        function stopRotateWheel() {
            cancelAnimationFrame(spinTimeout);
            isSpinning = false;
            spinBtn.disabled = false;

            // Calcular ganador
            // El puntero está arriba (270 grados o 3*PI/2 en canvas standard, pero nosotros dibujamos desde 0)
            // Ajustamos el ángulo actual módulo 2PI
            const degrees = startAngle * 180 / Math.PI + 90;
            const arcd = arc * 180 / Math.PI;
            const index = Math.floor((360 - degrees % 360) / arcd);
            
            ctx.save();
            ctx.font = 'bold 30px Arial';
            const text = names[index];
            resultDiv.textContent = "🎉 Guanyador: " + text + " 🎉";
            
            createConfetti();
            
            if (removeWinnerCheckbox.checked && names.length > 1) {
                names.splice(index, 1);
                namesInput.value = names.join('\n');
                localStorage.setItem('ruletaNoms', namesInput.value);
                setTimeout(() => {
                    arc = Math.PI * 2 / names.length;
                    startAngle = 0; // Resetear ángulo para evitar saltos raros
                    drawWheel();
                }, 2000);
            }
            ctx.restore();
        }

        function easeOut(t, b, c, d) {
            const ts = (t /= d) * t;
            const tc = ts * t;
            return b + c * (tc + -3 * ts + 3 * t);
        }

        function createConfetti() {
            for (let i = 0; i < 100; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.backgroundColor = palette[Math.floor(Math.random() * palette.length)];
                confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
                document.body.appendChild(confetti);
                
                setTimeout(() => {
                    confetti.remove();
                }, 4000);
            }
        }

        // Inicializar al cargar
        window.onload = init;
    </script>
</body>
</html>
