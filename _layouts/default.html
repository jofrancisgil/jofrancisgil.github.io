<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }}</title>
    <link rel="icon" type="image/png" href="IMG/logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* =========================================
           ESTILS GLOBALS - MINIMAL BRUTALISM
           ========================================= */
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', Courier, monospace; /* Tipografia crua/tècnica */
            margin: 0;
            padding: 0;
            background-color: #fdfdfd;
            background-image: radial-gradient(#c2c2c2 2px, transparent 2px);
            background-size: 30px 30px; /* Patró de punts brutalista */
            color: #000000;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* =========================================
           NAVEGACIÓ BRUTALISTA (Per al menu.html)
           ========================================= */
        .glass-header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: #ffffff;
            border-bottom: 5px solid #000000;
            padding: 15px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .glass-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 1200px;
            width: 100%;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            text-decoration: none;
            background: #ffd166;
            padding: 5px 15px;
            border: 3px solid #000;
            box-shadow: 4px 4px 0px #000;
            transition: all 0.1s;
        }

        .nav-logo img {
            height: 45px;
            width: auto;
        }

        .nav-logo:active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px #000;
        }

        .nav-links {
            display: flex;
            gap: 15px;
        }

        .nav-item {
            text-decoration: none;
            color: #000;
            font-weight: bold;
            text-transform: uppercase;
            padding: 8px 15px;
            border: 3px solid #000;
            background: #fff;
            box-shadow: 3px 3px 0px #000;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-item i {
            font-size: 1.1em;
            color: #000;
        }

        .nav-item:hover {
            box-shadow: 5px 5px 0px #000;
            transform: translate(-2px, -2px);
        }

        /* Colors específics per la navegació al fer hover */
        .nav-mates:hover { background: #ffb3c6; color: #000; }
        .nav-llengues:hover { background: #ffe6a7; color: #000; }
        .nav-medi:hover { background: #b7e4c7; color: #000; }
        .nav-musica:hover { background: #cdb4db; color: #000; }
        .nav-art:hover { background: #ffc8dd; color: #000; }
        .nav-jocs:hover { background: #a2d2ff; color: #000; }
        .nav-gestio:hover { background: #e9ecef; color: #000; }

        @media (max-width: 850px) {
            .glass-header {
                padding: 10px 15px;
            }
            .nav-links {
                position: fixed;
                bottom: 0;
                left: 0;
                width: 100%;
                background: #ffffff;
                border-top: 5px solid #000;
                padding: 15px 10px;
                display: flex;
                gap: 5px;
                justify-content: space-around;
                z-index: 2000;
                overflow-x: auto;
            }
            .nav-item {
                flex-direction: column;
                gap: 5px;
                padding: 10px 5px;
                font-size: 0.7em;
                box-shadow: 2px 2px 0px #000;
                min-width: 60px;
            }
            .nav-item i {
                font-size: 1.6em;
            }
            .nav-item:hover { transform: translate(-1px, -1px); box-shadow: 3px 3px 0px #000; }
            main { padding-bottom: 90px !important; } 
        }

        /* =========================================
           CONTENIDOR PRINCIPAL I ELEMENTS BRUTALISTES
           ========================================= */
        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            flex: 1;
            width: 100%;
            box-sizing: border-box;
        }

        /* HERO SECTION */
        .hero-section, .hero-brutal {
            background-color: #ffd166; /* Groc cridaner */
            border: 5px solid #000;
            box-shadow: 12px 12px 0px #000;
            padding: 60px 40px;
            margin-bottom: 80px;
            text-align: left;
            position: relative;
        }

        .hero-section h1, .hero-brutal h1 {
            font-size: 4.5em;
            font-weight: 900;
            text-transform: uppercase;
            line-height: 1;
            margin: 0 0 20px 0;
            color: #000;
            letter-spacing: -2px;
        }

        /* Amaguem o redefinim classes antigues (gradient-text) */
        .gradient-text {
            background: none;
            -webkit-text-fill-color: initial;
            color: #ef476f; /* Li donem un color sòlid brutalista */
            text-shadow: 3px 3px 0px #000;
        }

        .subtitle {
            font-size: 1.5em;
            font-weight: bold;
            color: #000;
            border-top: 5px solid #000;
            padding-top: 20px;
            max-width: 800px;
            margin: 0;
            background: #fff;
            display: inline-block;
            padding: 15px;
            border: 3px solid #000;
            box-shadow: 4px 4px 0px #000;
            margin-top: 20px;
        }

        /* TÍTOLS DE SECCIÓ */
        h2 {
            font-size: 2.5em;
            font-weight: 900;
            text-transform: uppercase;
            background: #000;
            color: #fff;
            display: inline-block;
            padding: 10px 20px;
            margin-top: 20px;
            margin-bottom: 40px;
            border: 5px solid #000;
            box-shadow: 6px 6px 0px rgba(0,0,0,0.2);
            transform: rotate(-1deg);
            width: auto;
        }
        
        .title-ai { background: #ef476f; }
        .title-top { background: #118ab2; }
        .title-brutal { background: #000; }

        /* GRAELLA */
        .grid-container, .brutalist-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 40px;
            margin-bottom: 80px;
        }

        /* TARGETES */
        .card, .card-brutal {
            border: 5px solid #000;
            box-shadow: 8px 8px 0px #000;
            padding: 30px 20px;
            text-decoration: none;
            color: #000;
            display: flex;
            flex-direction: column;
            transition: all 0.1s ease-out;
            position: relative;
            background-color: #fff; /* Fons per defecte si no tenen color */
            min-height: 220px;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .card:hover, .card-brutal:hover {
            transform: translate(4px, 4px);
            box-shadow: 4px 4px 0px #000;
        }

        .card:active, .card-brutal:active {
            transform: translate(8px, 8px);
            box-shadow: 0px 0px 0px #000;
        }

        /* Adaptem les antigues classes de color (grad-*) a colors sòlids brutalistes */
        .grad-purple, .color-purple { background-color: #cdb4db; }
        .grad-purple:hover, .color-purple:hover { background-color: #9d4edd; color: white; }
        
        .grad-blue, .color-blue { background-color: #a2d2ff; }
        .grad-blue:hover, .color-blue:hover { background-color: #00b4d8; color: white; }
        
        .grad-orange, .color-orange { background-color: #ffe6a7; }
        .grad-orange:hover, .color-orange:hover { background-color: #fb8500; color: white; }

        .grad-green, .color-green { background-color: #b7e4c7; }
        .grad-green:hover, .color-green:hover { background-color: #40916c; color: white; }

        .grad-red, .color-pink { background-color: #ffb3c6; }
        .grad-red:hover, .color-pink:hover { background-color: #ff4d6d; color: white; }
        
        .grad-teal { background-color: #90e0ef; }
        .grad-teal:hover { background-color: #0077b6; color: white; }
        
        .grad-calm { background-color: #caf0f8; }
        .grad-calm:hover { background-color: #03045e; color: white; }

        .card-icon {
            font-size: 3.5em;
            margin-bottom: 20px;
            border-bottom: 4px solid currentColor;
            padding-bottom: 10px;
            display: inline-block;
            color: #000; /* Forcem el negre en comptes del blanc antic */
            text-shadow: none;
        }
        
        .card:hover .card-icon {
            color: currentColor;
        }

        .card h3, .card-brutal h3 {
            font-size: 1.8em;
            font-weight: 900;
            text-transform: uppercase;
            margin: 0 0 15px 0;
            line-height: 1.1;
            text-shadow: none;
        }

        .card p, .card-brutal p {
            font-size: 1.1em;
            font-weight: bold;
            line-height: 1.4;
            margin: 0;
            border-top: 2px dashed rgba(0,0,0,0.3);
            padding-top: 15px;
            opacity: 1;
        }

        /* =========================================
           FOOTER BRUTALISTA
           ========================================= */
        footer {
            background: #000;
            color: #fff;
            text-align: center;
            padding: 40px 20px;
            border-top: 10px solid #ef476f;
            margin-top: auto;
        }

        footer p {
            font-size: 1.2em;
            font-weight: bold;
            text-transform: uppercase;
            margin: 10px 0;
        }
        
        .footer-content { max-width: 800px; margin: 0 auto; }
        .cc-license img { margin-bottom: 10px; filter: grayscale(100%) contrast(200%); } /* Fem el logo CC brutalista */
        .cc-license a { color: #ffd166; text-decoration: underline; text-decoration-thickness: 3px; font-weight: bold;}

        @media (max-width: 768px) {
            .hero-section h1, .hero-brutal h1 { font-size: 3em; }
        }
    </style>
</head>
<body>

    {% include menu.html %}

    <main>
        {{ content }}
    </main>

    {% include footer.html %}

</body>
</html>
